<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soru Çözücü Pro | Dinamik Test Sistemi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --error: #ef4444;
            --border: #334155;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            padding: 20px;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin-top: 40px;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: transform 0.3s ease;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Catalog Grid */
        #catalog-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .catalog-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        .catalog-item:hover {
            border-color: var(--primary);
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.2);
            transform: translateY(-4px);
        }

        .catalog-item h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
        }

        /* Buttons */
        .btn {
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: scale(1.02);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text-muted);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Quiz UI */
        #quiz-container {
            display: none;
        }

        .question-header {
            margin-bottom: 24px;
        }

        .question-number {
            display: inline-block;
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 0.875rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-main);
            line-height: 1.4;
        }

        .options-grid {
            display: grid;
            gap: 12px;
            margin-bottom: 24px;
        }

        .option-card {
            padding: 16px 20px;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-size: 1.05rem;
            background: var(--card-bg);
            position: relative;
            overflow: hidden;
            color: var(--text-main);
        }

        .option-card:hover:not(.disabled) {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .option-card.correct {
            border-color: var(--success);
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
        }

        .option-card.wrong {
            border-color: var(--error);
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
        }

        .option-card.disabled {
            cursor: default;
        }

        .explanation {
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            display: none;
            font-weight: 500;
            animation: slideUp 0.3s ease-out;
        }

        .explanation.visible {
            display: block;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .quiz-footer {
            margin-top: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 30px 0;
            position: relative;
        }

        .divider span {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            padding: 0 10px;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Loading Spinner */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Menu View -->
        <div id="menu-view" class="card">
            <div class="header">
                <h1>Soru Çözücü</h1>
                <p>Hangi kategoriden soru çözmek istersiniz?</p>
            </div>

            <div id="catalog-container">
                <div style="grid-column: 1/-1; text-align: center; color: var(--text-muted);">Katalog yükleniyor...
                </div>
            </div>


        </div>

        <!-- Quiz View -->
        <div id="quiz-view" class="card" style="display: none;">
            <div id="quiz-content">
                <div class="question-header">
                    <span id="q-num" class="question-number">Soru 1</span>
                    <h2 id="q-text" class="question-text">Soru yükleniyor...</h2>
                </div>

                <div id="options-grid" class="options-grid"></div>

                <div id="explanation-box" class="explanation"></div>

                <div class="quiz-footer">
                    <button id="back-nav-btn" class="btn btn-outline" onclick="handleBack()">Geri</button>
                    <div id="progress" style="color: var(--text-muted); font-size: 0.9rem;"></div>
                    <button id="next-btn" class="btn btn-primary" style="display: none; width: auto;"
                        onclick="nextQuestion()">Sonraki</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let questionsData = [];
        let currentQuestionIndex = 0;
        let catalog = [];

        // Initialize - Fetch Catalog
        async function init() {
            try {
                const response = await fetch('catalog.json');
                catalog = await response.json();
                renderCatalog();
            } catch (error) {
                console.error('Katalog yüklenemedi:', error);
                document.getElementById('catalog-container').innerHTML =
                    '<div style="grid-column: 1/-1; color: var(--error);">Katalog yüklenirken hata oluştu.</div>';
            }
        }

        function renderCatalog() {
            const container = document.getElementById('catalog-container');
            container.innerHTML = '';

            catalog.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'catalog-item';
                div.innerHTML = `<h3>${item.name}</h3>`;
                div.onclick = () => loadFromCatalog(item.path);
                container.appendChild(div);
            });
        }

        async function loadFromCatalog(path) {
            // Absolute paths won't work in fetch if coming from catalog directly as c:\...
            // We convert them to relative paths assuming the same structure.
            let relativePath = path;
            const basePath = "c:\\Numan\\Numan\\Ders\\SoruCozucu\\";
            if (path.toLowerCase().startsWith(basePath.toLowerCase())) {
                relativePath = path.substring(basePath.length).replace(/\\/g, '/');
            } else {
                // Fallback for paths that might already be relative or have different root
                relativePath = path.split('SoruCozucu\\')[1]?.replace(/\\/g, '/') || path;
            }

            try {
                const response = await fetch(relativePath);
                if (!response.ok) throw new Error('Dosya bulunamadı');
                questionsData = await response.json();
                startQuiz();
            } catch (error) {
                console.error('Soru dosyası yüklenemedi:', error);
                alert('Soru dosyası yüklenemedi: ' + relativePath);
            }
        }



        function startQuiz() {
            currentQuestionIndex = 0;
            document.getElementById('menu-view').style.display = 'none';
            document.getElementById('quiz-view').style.display = 'block';
            loadQuestion();
        }

        function loadQuestion() {
            const data = questionsData[currentQuestionIndex];
            const optionsGrid = document.getElementById('options-grid');
            const nextBtn = document.getElementById('next-btn');
            const expBox = document.getElementById('explanation-box');

            document.getElementById('q-num').innerText = `Soru ${currentQuestionIndex + 1}`;
            document.getElementById('q-text').innerText = data.question;
            document.getElementById('progress').innerText = `${currentQuestionIndex + 1} / ${questionsData.length}`;

            optionsGrid.innerHTML = '';
            expBox.classList.remove('visible');
            nextBtn.style.display = 'none';

            data.options.forEach((opt, idx) => {
                const card = document.createElement('div');
                card.className = 'option-card';
                card.innerText = opt;
                card.onclick = () => selectOption(card, idx, data.correctIndex, data.explanations[idx]);
                optionsGrid.appendChild(card);
            });

            // Update back button behavior
            const bBtn = document.getElementById('back-nav-btn');
            if (currentQuestionIndex === 0) {
                bBtn.innerText = "Ana Menü";
            } else {
                bBtn.innerText = "Önceki";
            }
        }

        function selectOption(el, selectedIdx, correctIdx, explanation) {
            if (el.classList.contains('disabled')) return;

            const cards = document.querySelectorAll('.option-card');
            cards.forEach(c => c.classList.add('disabled'));

            const isCorrect = selectedIdx === correctIdx;
            el.classList.add(isCorrect ? 'correct' : 'wrong');

            if (!isCorrect) {
                cards[correctIdx].classList.add('correct');
            }

            const expBox = document.getElementById('explanation-box');
            expBox.innerText = explanation || (isCorrect ? "Doğru cevap!" : "Yanlış cevap.");
            expBox.style.background = isCorrect ? 'rgba(34, 197, 94, 0.1)' : 'rgba(239, 68, 68, 0.1)';
            expBox.style.color = isCorrect ? '#4ade80' : '#f87171';
            expBox.style.border = `1px solid ${isCorrect ? 'rgba(34, 197, 94, 0.2)' : 'rgba(239, 68, 68, 0.2)'}`;
            expBox.classList.add('visible');

            const nextBtn = document.getElementById('next-btn');
            nextBtn.style.display = 'block';
            if (currentQuestionIndex === questionsData.length - 1) {
                nextBtn.innerText = "Testi Bitir";
            } else {
                nextBtn.innerText = "Sonraki";
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < questionsData.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                returnToMenu();
            }
        }

        function handleBack() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion();
            } else {
                returnToMenu();
            }
        }

        function returnToMenu() {
            document.getElementById('quiz-view').style.display = 'none';
            document.getElementById('menu-view').style.display = 'block';
        }

        // Start
        init();
    </script>

</body>

</html>
